name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pom.xml'
  workflow_dispatch:
    inputs:
      run_tests:
        description: 'Executar testes?'
        required: true
        default: true
        type: boolean
      run_lint:
        description: 'Executar análise de código (lint)?'
        required: true
        default: true
        type: boolean

jobs:
  lint-and-test:
    uses: ./.github/workflows/lint-and-test.yml
    with:
      run_tests: ${{ github.event_name != 'workflow_dispatch' || inputs.run_tests }}
      run_lint: ${{ github.event_name != 'workflow_dispatch' || inputs.run_lint }}

  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Configurar Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven'
      
      - name: Compilar projeto
        run: mvn clean compileeee

  package:
    runs-on: ubuntu-latest
    needs: [build, lint-and-test]
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Configurar Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven'
      
      - name: Gerar JAR
        run: mvn package -DskipTests
      
      - name: Upload do JAR
        uses: actions/upload-artifact@v4
        with:
          name: devcalc-jar
          path: target/*.jar
          retention-days: 30

  deploy:
    runs-on: ubuntu-latest
    needs: [build, lint-and-test, package]
    
    steps:
      - name: Simular deploy
        run: |
          echo "Iniciando deploy da aplicação..."
          echo "Deploy realizado com sucesso!"
          echo "Aplicação disponível em: http://devcalc-api.example.com"
