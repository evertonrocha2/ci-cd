name: CI/CD Pipeline

# Gatilhos do workflow
on:
  # Executa em push na branch main
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/ci.yml'
  
  # Executa em pull requests que modifiquem arquivos em src/
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pom.xml'
  
  # Permite execução manual
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente para deploy'
        required: false
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - production
      run_tests:
        description: 'Executar testes automatizados'
        required: false
        type: boolean
        default: true
      run_lint:
        description: 'Executar análise de código (lint)'
        required: false
        type: boolean
        default: true

jobs:
  # Job 1: Checkout do código
  checkout:
    name: Checkout Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
      
      - name: Exibir informações do commit
        run: |
          echo "Commit SHA: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Autor: ${{ github.actor }}"
      
      - name: Upload do código fonte
        uses: actions/upload-artifact@v4
        with:
          name: source-code
          path: .
          retention-days: 1

  # Job 2: Workflow Reutilizável para Lint e Testes
  lint-and-test:
    name: Lint and Test (Reusable)
    uses: ./.github/workflows/lint-and-test.yml
    needs: checkout
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_tests || inputs.run_lint }}
    with:
      java-version: '11'
      run-lint: ${{ github.event_name != 'workflow_dispatch' || inputs.run_lint }}
      run-tests: ${{ github.event_name != 'workflow_dispatch' || inputs.run_tests }}

  # Job 3: Code Quality Analysis (Action do Marketplace)
  code-quality:
    name: Code Quality Check with Marketplace Action
    runs-on: ubuntu-latest
    needs: checkout
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_lint }}
    
    steps:
      - name: Download do código fonte
        uses: actions/download-artifact@v4
        with:
          name: source-code
      
      - name: Configurar Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven'
      
      - name: Executar Checkstyle
        run: mvn checkstyle:checkstyle
      
      - name: Checkstyle Report Action (Marketplace)
        uses: jwgmeligmeyling/checkstyle-github-action@v1.2
        with:
          path: '**/checkstyle-result.xml'

  # Job 4: Build da aplicação
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: checkout
    
    steps:
      - name: Download do código fonte
        uses: actions/download-artifact@v4
        with:
          name: source-code
      
      - name: Configurar Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven'
      
      - name: Exibir versão do Java e Maven
        run: |
          java -version
          mvn -version
      
      - name: Build com Maven
        run: mvn clean install -DskipTests
      
      - name: Upload de artefatos do build
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: target/
          retention-days: 5

  # Job 5: Empacotar aplicação
  package:
    name: Package Application
    runs-on: ubuntu-latest
    needs: [build, lint-and-test]
    
    steps:
      - name: Download do código fonte
        uses: actions/download-artifact@v4
        with:
          name: source-code
      
      - name: Configurar Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven'
      
      - name: Gerar JAR executável
        run: mvn package -DskipTests
      
      - name: Listar arquivos gerados
        run: ls -lh target/*.jar
      
      - name: Upload do JAR
        uses: actions/upload-artifact@v4
        with:
          name: devcalc-jar
          path: target/devcalc-api.jar
          retention-days: 30

  # Job 6: Deploy (simulação)
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: [build, lint-and-test, package]
    
    steps:
      - name: Download do JAR
        uses: actions/download-artifact@v4
        with:
          name: devcalc-jar
      
      - name: Exibir artefato baixado
        run: ls -lh devcalc-api.jar
      
      - name: Simular deploy
        run: |
          echo "=========================================="
          echo "Deploy realizado com sucesso"
          echo "=========================================="
          echo "Ambiente: ${{ github.event.inputs.environment || 'main' }}"
          echo "Versão: 1.0.0"
          echo "Artefato: devcalc-api.jar"
          echo "Data: $(date)"
          echo "=========================================="
      
      - name: Resumo do deploy
        run: |
          echo "###Deploy Concluído com Sucesso!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Ambiente:** ${{ github.event.inputs.environment || 'main' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Versão:** 1.0.0" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
